<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B21A8"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  <!-- Question mark -->
  <text x="256" y="340" font-family="Georgia, 'Times New Roman', serif" font-size="320" font-weight="bold" fill="rgba(255,255,255,0.08)" text-anchor="middle" dominant-baseline="central">?</text>
  <!-- Title text -->
  <text x="256" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#gold)" text-anchor="middle" letter-spacing="-1">TAG THAT</text>
  <text x="256" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="900" fill="url(#gold)" text-anchor="middle" letter-spacing="-2">LINE</text>
</svg>
